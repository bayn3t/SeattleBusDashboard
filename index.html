<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive map of all active Seattle/King County Metro bus stops with route and accessibility information.">
    <title>Seattle Metro Bus Stops Map</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="busbanner.png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.Default.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>
    
    <!-- Search Box -->
    <div class="search-box">
        <div class="search-controls">
            <input 
                type="text" 
                id="search-input"
                placeholder="Search..."
                autocomplete="off"
            >
            <div class="search-toggle">
                <button id="mode-route" class="toggle-btn active" data-mode="route">Route</button>
                <button id="mode-location" class="toggle-btn" data-mode="location">Location</button>
            </div>
        </div>
        <button id="clear-search" style="padding: 8px 12px; margin-top: 5px; background: #e0e0e0; color: #333; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">Clear</button>
        <a href="about.html" style="display: block; margin-top: 8px; padding: 8px 12px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; text-decoration: none; text-align: center; font-weight: 500;">About</a>
    </div>
    
    <!-- Legend -->
    <div class="legend">
        <h3>Map Legend</h3>
        <div style="margin-bottom: 12px;">
            <p style="font-weight: bold; margin: 8px 0 6px 0; font-size: 12px;">Marker View (Zoom 14+)</p>
            <div class="legend-item">
                <div class="legend-circle small"></div>
                <span>1-2 Routes</span>
            </div>
            <div class="legend-item">
                <div class="legend-circle medium"></div>
                <span>3-5 Routes</span>
            </div>
            <div class="legend-item">
                <div class="legend-circle large"></div>
                <span>6+ Routes</span>
            </div>
        </div>
        <div style="border-top: 1px solid #ccc; padding-top: 12px;">
            <p style="font-weight: bold; margin: 0 0 6px 0; font-size: 12px;">Heatmap View (Zoom &lt;14)</p>
            <div id="heatmap-legend">
                <!-- Dynamically populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <!-- Loading indicator -->
    <div class="loading" id="loading">
        <span class="spinner"></span>Loading stops...
    </div>
    
    <!-- About Button (Bottom Left) -->
    <a href="about.html" style="position: fixed; bottom: 20px; left: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-weight: 500; z-index: 1000;">About</a>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.0/dist/leaflet.markercluster.js"></script>
    
    <!-- H3 JS (for hexagonal binning) -->
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    
    <!-- Main App JS -->
    <script src="js/main.js"></script>
</body>
</html>
